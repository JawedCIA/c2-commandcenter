<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1d30"/>
    </linearGradient>
    <linearGradient id="logoOrbitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.3)"/>
    </linearGradient>
  </defs>

  <!-- C2 Icon -->
  <g transform="translate(30, 30)">
    <!-- Circle background -->
    <circle cx="0" cy="0" r="24" fill="url(#logoBgGrad)"/>
    <!-- Stylized C letter -->
    <path
      d="M 4 -11 C -4 -11, -11 -6, -11 0 C -11 6, -4 11, 4 11"
      stroke="white"
      stroke-width="4"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Orbital swoosh (representing 2) -->
    <path
      d="M 6 -9 C 11 -11, 14 -8, 13 -3 C 11 3, 4 4, -1 5 L 11 5"
      stroke="url(#logoOrbitGrad)"
      stroke-width="2.5"
      stroke-linecap="round"
      fill="none"
    />
    <!-- Small orbital dot -->
    <circle cx="11" cy="5" r="2" fill="white"/>
  </g>

  <!-- Text -->
  <g fill="#1e3a5f">
    <text x="62" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" letter-spacing="1">
      COMMAND CENTER
    </text>
    <text x="62" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="8" font-weight="600" letter-spacing="1.5" fill="#64748b">
      THE CIA OF REAL ESTATE EXECUTION
    </text>
  </g>
</svg>
